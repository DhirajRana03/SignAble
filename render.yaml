# Render Blueprint — three services + Postgres + Redis from one monorepo.
# https://render.com/docs/blueprint-spec
#
# Usage:
#   1. New + → Blueprint → connect this repo → pick branch `main`.
#   2. Render reads this file and provisions all services.
#   3. Set the secret env vars marked `sync: false` per service in the
#      dashboard (NEXT_PUBLIC_API_URL, STORAGE_URL_BASE, EMAIL_* creds).

services:
  # ---------- processor (FastAPI / Python) ----------
  - type: web
    name: signable-processor
    runtime: docker
    rootDir: processor
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true

  # ---------- backend (NestJS / Node) ----------
  - type: web
    name: signable-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/v1/health/live # liveness only — avoids processor cold-start cascade on free tier
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: signable-postgres
          property: connectionString
      - key: PROCESSOR_URL
        value: https://signable-processor.onrender.com # free tier — no internal DNS, public URL required
      - key: REDIS_HOST
        fromService:
          type: redis
          name: signable-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: signable-redis
          property: port
      - key: REDIS_PASSWORD
        sync: false # paste from Render Redis dashboard once provisioned
      - key: REDIS_DB
        value: "0"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: STORAGE_ROOT
        value: /app/storage
      - key: QUEUES_INLINE
        value: "false"
      - key: EMAIL_ENABLED
        value: "false" # flip true after provider creds set
      - key: EMAIL_PROVIDER
        value: smtp # smtp | sendgrid | postmark | console
      - key: EMAIL_FROM
        value: noreply@signable.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: POSTMARK_SERVER_TOKEN
        sync: false
      - key: MAX_UPLOAD_BYTES
        value: "52428800"
      - key: ALLOWED_ORIGINS
        value: https://signable-app.onrender.com
      - key: FRONTEND_URL
        value: https://signable-app.onrender.com
      - key: STORAGE_URL_BASE
        sync: false # set to https://<backend-host>/api/v1/files after first deploy

  # ---------- frontend (Next.js) ----------
  - type: web
    name: signable-app
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false # set in dashboard once backend has a public URL, then redeploy

  # ---------- redis (BullMQ job queue) ----------
  - type: redis
    name: signable-redis
    plan: free
    maxmemoryPolicy: allkeys-lru # free tier 25MB, must evict to stay up
    ipAllowList: [] # only Render-internal services

databases:
  - name: signable-postgres
    plan: free
    postgresMajorVersion: "16"
